<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AI CV Builder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    {% load static %}
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    {% load static %}

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  </head>

  <body>
    <nav class="navbar navbar-expand-lg">
      <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'home' %}">
          <i class="bi bi-file-earmark-person-fill"></i>
          AI CV Builder
        </a>

        <div class="ms-auto d-flex align-items-center">
          {% if user.is_authenticated %}

          <a class="nav-link" href="{% url 'home' %}">
            <i class="bi bi-house-fill"></i>
            Home
          </a>

          <a class="nav-link" href="{% url 'dashboard' %}">
            <i class="bi bi-grid-1x2-fill"></i>
            Dashboard
          </a>

          <a class="nav-link" href="{% url 'create_cv' %}">
            <i class="bi bi-plus-circle-fill"></i>
            Create CV
          </a>

          <a class="nav-link" href="{% url 'pricing' %}">
            <i class="bi bi-stars"></i>
            Premium
          </a>

          <a class="nav-link" href="{% url 'register' %}">
            <i class="bi bi-person-plus-fill"></i>
            Register
          </a>

          <form
            method="POST"
            action="{% url 'logout' %}"
            class="d-inline m-0 p-0"
          >
            {% csrf_token %}
            <button type="submit" class="nav-link btn btn-link">
              <i class="bi bi-box-arrow-right"></i>
              Logout
            </button>
          </form>

          {% else %}

          <a class="nav-link" href="{% url 'login' %}"> Login </a>

          <a class="nav-link" href="{% url 'register' %}"> Register </a>

          {% endif %}
        </div>
      </div>
    </nav>

    <main class="page-shell">{% block content %} {% endblock %}</main>

    <footer>© 2026 AI CV Builder — Built with Django, AI & Stripe</footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
