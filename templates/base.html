<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AI CV Builder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --navy: #071f3d;
        --blue: #2563eb;
        --light-blue: #eff6ff;
        --bg: #eef3f8;
        --text: #111827;
        --muted: #64748b;
        --border: #e5e7eb;
        --success: #16864f;
        --warning: #f5b700;
        --danger: #dc3545;
      }

      body {
        background: var(--bg);
        font-family: "Inter", "Segoe UI", Arial, sans-serif;
        color: var(--text);
        font-size: 18px;
      }

      .navbar {
        background: var(--navy);
        padding: 22px 46px;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.18);
      }

      .navbar-brand {
        color: #ffffff !important;
        font-size: 30px;
        font-weight: 900;
        letter-spacing: -0.5px;
      }

      .navbar-brand i {
        color: #93c5fd;
        margin-right: 8px;
      }

      .nav-link {
        color: #ffffff !important;
        font-size: 17px;
        font-weight: 700;
        margin-left: 24px;
      }

      .nav-link:hover {
        color: #93c5fd !important;
      }

      .page-shell {
        width: 92%;
        max-width: 1500px;
        margin: 52px auto;
      }

      h1,
      h2,
      h3,
      h4,
      h5 {
        font-weight: 800;
        color: #0f172a;
        letter-spacing: -0.4px;
      }

      .card {
        border: none;
        border-radius: 24px;
        box-shadow: 0 16px 42px rgba(15, 23, 42, 0.1);
      }

      .card-body {
        padding: 36px;
      }

      .btn {
        border-radius: 14px;
        font-size: 18px;
        font-weight: 700;
        padding: 13px 22px;
      }

      .btn-sm {
        font-size: 15px;
        padding: 8px 14px;
      }

      .btn-primary {
        background: var(--blue);
        border-color: var(--blue);
      }

      .btn-primary:hover {
        background: #1d4ed8;
        border-color: #1d4ed8;
      }

      .badge {
        font-size: 15px;
        border-radius: 10px;
        padding: 9px 13px;
      }

      input,
      textarea,
      select {
        width: 100%;
        border-radius: 14px;
        border: 1px solid #cbd5e1;
        padding: 14px 16px;
        font-size: 17px;
        background: #ffffff;
      }

      input:focus,
      textarea:focus,
      select:focus {
        outline: none;
        border-color: var(--blue);
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
      }

      textarea {
        min-height: 150px;
      }

      label {
        font-weight: 800;
        margin-bottom: 8px;
        color: #334155;
      }

      .hero-panel {
        background: linear-gradient(135deg, #071f3d 0%, #123c69 100%);
        color: #ffffff;
        border-radius: 32px;
        padding: 64px;
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.22);
      }

      .hero-panel h1,
      .hero-panel h2,
      .hero-panel h3,
      .hero-panel p {
        color: #ffffff;
      }

      .section-title {
        font-size: 44px;
        font-weight: 900;
        margin-bottom: 14px;
      }

      .section-subtitle {
        color: var(--muted);
        font-size: 21px;
        max-width: 780px;
      }

      footer {
        margin-top: 90px;
        padding: 34px;
        text-align: center;
        color: var(--muted);
        font-size: 16px;
      }

      @media (max-width: 900px) {
        .navbar {
          padding: 18px 22px;
        }

        .nav-link {
          margin-left: 12px;
          font-size: 15px;
        }

        .page-shell {
          width: 94%;
          margin: 30px auto;
        }

        .hero-panel {
          padding: 36px;
        }
      }
    </style>
  </head>

  <body>
    <nav class="navbar navbar-expand-lg">
      <a class="navbar-brand" href="{% url 'home' %}">
        <i class="bi bi-file-earmark-person-fill"></i>AI CV Builder
      </a>

      <div class="ms-auto d-flex align-items-center">
        {% if user.is_authenticated %}
        <a class="nav-link" href="{% url 'dashboard' %}">
          <i class="bi bi-grid-1x2-fill"></i> Dashboard
        </a>
        <a class="nav-link" href="{% url 'create_cv' %}">
          <i class="bi bi-plus-circle-fill"></i> Create CV
        </a>
        <a class="nav-link" href="{% url 'subscribe' %}">
          <i class="bi bi-stars"></i> Premium
        </a>
        <a class="nav-link text-warning" href="{% url 'logout' %}">
          <i class="bi bi-box-arrow-right"></i> Logout
        </a>
        {% else %}
        <a class="nav-link" href="{% url 'login' %}">Login</a>
        <a class="nav-link" href="{% url 'register' %}">Register</a>
        {% endif %}
      </div>
    </nav>

    <main class="page-shell">{% block content %} {% endblock %}</main>

    <footer>© 2026 AI CV Builder — Built with Django, AI & Stripe</footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
