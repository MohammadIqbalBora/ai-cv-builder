<h1>Dashboard</h1>

<p>Welcome, {{ user.username }} 👋</p>

<a href="/cv/create/">➕ Create New CV</a>

<hr />

<h3>Your CVs</h3>

{% if cvs %}
<ul>
  {% for cv in cvs %}
  <li>
    <strong>{{ cv.full_name }}</strong><br />
    {{ cv.email }}<br />
    Created: {{ cv.created_at }}<br /><br />

    <a href="{% url 'edit_cv' cv.id %}">✏️ Edit</a> |
    <a href="{% url 'download_cv_pdf' cv.id %}">📄 Download PDF</a>
  </li>
  <br />
  {% endfor %}
</ul>
{% else %}
<p>No CVs yet. Create your first one!</p>
{% endif %}
